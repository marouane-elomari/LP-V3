name: Build & Deploy

on:
  # ── Triggered by Strapi webhook when a blog post is published ──
  repository_dispatch:
    types: [blog-published]

  # ── Daily rebuild at 3am UTC (picks up any new posts) ──
  schedule:
    - cron: '0 3 * * *'

  # ── Manual trigger from GitHub UI ──
  workflow_dispatch:

  # ── Every push to main (source code changes) ──
  push:
    branches: [main]

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      # 1. Checkout source code
      - name: Checkout source
        uses: actions/checkout@v4
        with:
          ref: main

      # 2. Setup Node.js
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      # 3. Install dependencies
      - name: Install dependencies
        run: npm ci

      # 4. Build (Vite) + generate sitemap (fetches from Strapi)
      - name: Build & generate sitemap
        env:
          VITE_STRAPI_URL: ${{ secrets.STRAPI_URL }}
          STRAPI_URL: ${{ secrets.STRAPI_URL }}
          VITE_SITE_URL: https://luuzon.com
          SITE_URL: https://luuzon.com
        run: npm run build

      # 5. Copy .htaccess into dist
      - name: Copy .htaccess
        run: cp .htaccess dist/.htaccess

      # 6. Deploy — push dist content to live branch
      - name: Deploy to live branch
        run: |
          cd dist
          git init
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "Deploy: $(date -u '+%Y-%m-%d %H:%M UTC') [auto]"
          git push --force https://x-access-token:${{ secrets.GITHUB_TOKEN }}@github.com/${{ github.repository }}.git HEAD:live

      # 7. Ping Google with the updated sitemap
      - name: Ping Google sitemap
        run: |
          curl -s "https://www.google.com/ping?sitemap=https://luuzon.com/sitemap.xml"
          echo "✓ Google pinged"
